<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }}</title>
  {{ $slidesCSS := resources.Get "css/slides.css" | fingerprint }}
  <link rel="stylesheet" href="{{ $slidesCSS.RelPermalink }}" />
  <style>
    :root {
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --radius-sm: 0.25rem;
      --radius-md: 0.375rem;
      --radius-lg: 0.5rem;
      --radius-xl: 0.75rem;
      --radius-2xl: 1rem;
      --color-primary: #2563eb;
      --color-primary-light: #3b82f6;
      --color-primary-dark: #1d4ed8;
      --color-gray-400: #94a3b8;
      --color-gray-800: #1e293b;
      --color-background: #ffffff;
      --color-background-alt: #f8fafc;
      --color-background-subtle: #f1f5f9;
      --color-text-primary: #0f172a;
      --color-text-secondary: #475569;
      --color-text-muted: #64748b;
      --color-text-inverse: #ffffff;
      --color-border: #e2e8f0;
      --color-border-light: #f1f5f9;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }
    body { margin: 0; padding: 0; background: #0f0f0f; overflow: hidden; }
    .embed-wrap { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
    .embed-wrap .slide-viewer { border-radius: 0; flex: 1; display: flex; flex-direction: column; margin-bottom: 0; }
    .embed-wrap .slide-viewer__stage { flex: 1; }
    .embed-wrap .slide-viewer__img { max-height: calc(100vh - 70px); }
    .embed-footer { background: #1a1a1a; padding: 4px 12px; text-align: right; font-size: 0.75rem; }
    .embed-footer a { color: #94a3b8; text-decoration: none; }
    .embed-footer a:hover { color: #e2e8f0; }
  </style>
</head>
<body>
  <div class="embed-wrap">
    {{ partial "slideviewer.html" (dict "page" . "id" "embed-viewer") }}
    <div class="embed-footer">
      <a href="{{ .Permalink }}" target="_blank" rel="noopener">{{ .Title }} &mdash; view full presentation</a>
    </div>
  </div>
  {{ $viewerJS := resources.Get "js/slideviewer.js" | fingerprint }}
  <script src="{{ $viewerJS.RelPermalink }}" defer></script>
</body>
</html>
